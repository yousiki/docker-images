#? Config file for btop v.1.4.6
# Trimmed copy of chezmoi: dot_config/btop/btop.conf — only the keys I actually
# tune away from upstream defaults. The rest are left at their built-in values.

color_theme = "catppuccin_mocha"
theme_background = true
truecolor = true
rounded_corners = true
terminal_sync = true

graph_symbol = "braille"
shown_boxes = "cpu mem net proc"

update_ms = 2000

proc_sorting = "cpu lazy"
proc_colors = true
proc_gradient = true
proc_mem_bytes = true
proc_cpu_graphs = true

cpu_invert_lower = true
show_uptime = true
check_temp = true
show_coretemp = true
show_cpu_freq = true

mem_graphs = true
show_swap = true
swap_disk = true

show_io_stat = true

net_auto = true
net_sync = true

show_battery = false

log_level = "WARNING"
save_config_on_exit = true
