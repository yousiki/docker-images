# ~/.tmux.conf — sane defaults for a dev container
# Used as fallback when zellij isn't available.

# --- Prefix ---------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General --------------------------------------------------------------
set  -g base-index 1
setw -g pane-base-index 1
set  -g renumber-windows on
set  -g history-limit 50000
set -sg escape-time 10            # snappier ESC for vim/neovim
set  -g focus-events on
set  -g mouse on

# True-color & 256-color
set  -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*:Tc"

# --- Reload ---------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- Splits keep current path --------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# --- Vim-style pane navigation -------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Copy mode (vi keys) -------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- Status bar ----------------------------------------------------------
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour250"
set -g status-left  "#[fg=colour39,bold] #S #[default]"
set -g status-right "#[fg=colour244]%Y-%m-%d %H:%M"
set -g status-left-length 20
