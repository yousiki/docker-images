name: cluster-dev

on:
  push:
    branches: [main]
    tags: ['cluster-dev/v*']
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registries (otherwise build only)'
        type: boolean
        default: true

env:
  # Image name suffix is the same on both registries: <owner>/cluster-dev
  IMAGE_NAME: cluster-dev
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io

concurrency:
  group: cluster-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Full image: CUDA-cudnn-devel + uv/bun/node + zellij/tmux + btop/gdu/yazi
          # GHCR only — the cudnn-devel layer is too large for Docker Hub's
          # blob upload API (returns 400 on the monolithic PUT). The full
          # image is also unnecessary on Docker Hub: it's only useful from
          # networks that already reach GHCR fine.
          - variant: full
            dockerfile: cluster-dev/Dockerfile
            cache_scope: cluster-dev
            latest_value: latest
            tag_prefix: ""
            free_disk: true
            push_dockerhub: false
          # Minimal smoke-test image: CUDA-base + uv + bun
          # Pushed to both registries — Docker Hub is the fallback for
          # clusters where GHCR is blocked (e.g. Alibaba Cloud).
          - variant: base
            dockerfile: cluster-dev/Dockerfile.base
            cache_scope: cluster-dev-base
            latest_value: base
            tag_prefix: "base-"
            free_disk: false
            push_dockerhub: true

    steps:
      # GHA runners only have ~14GB free; CUDA-cudnn-devel + tooling exceeds
      # that for the `full` variant. The `:base` variant is small enough that
      # freeing disk just adds ~2 minutes for nothing.
      - name: Free runner disk space
        if: matrix.free_disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Hub login is conditional on (a) the secret being set, and
      # (b) the matrix variant opting in — the `full` variant is too large
      # for Docker Hub's blob API.
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && matrix.push_dockerhub && vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Always push to GHCR. Push to Docker Hub only when this matrix
          # variant opts in AND DOCKERHUB_USERNAME is configured.
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ${{ matrix.push_dockerhub && vars.DOCKERHUB_USERNAME != '' && format('{0}/{1}/{2}', env.DOCKERHUB_REGISTRY, vars.DOCKERHUB_USERNAME, env.IMAGE_NAME) || '' }}
          tags: |
            type=raw,value=${{ matrix.latest_value }},enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ matrix.tag_prefix }}
            type=ref,event=pr,prefix=${{ matrix.tag_prefix }}
            type=match,pattern=cluster-dev/v(.*),group=1,prefix=${{ matrix.tag_prefix }}
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./cluster-dev
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false

      - name: Summary
        if: steps.meta.outputs.tags != ''
        run: |
          {
            echo "### ${{ matrix.variant }} — pushed tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
