name: cluster-dev

on:
  push:
    branches: [main]
    tags: ['cluster-dev/v*']
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to registries (otherwise build only)'
        type: boolean
        default: true

env:
  # Image name suffix is the same on both registries: <owner>/cluster-dev
  IMAGE_NAME: cluster-dev
  GHCR_REGISTRY: ghcr.io
  DOCKERHUB_REGISTRY: docker.io

concurrency:
  group: cluster-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # GPU base: CUDA cuDNN devel + uv + bun (only).
          # Built as the `base` target of cluster-dev/Dockerfile so it stays
          # bit-identical to the lower layers of `full`.
          - variant: base
            dockerfile: cluster-dev/Dockerfile
            target: base
            cache_scope: cluster-dev-base
            latest_value: base
            tag_prefix: "base-"
            free_disk: true
          # GPU full: base + dev toolchain (node, btop, gdu, yazi, zellij,
          # starship, zsh dotfiles, etc.).
          - variant: full
            dockerfile: cluster-dev/Dockerfile
            target: full
            cache_scope: cluster-dev-full
            latest_value: latest
            tag_prefix: ""
            free_disk: true
          # CPU: full toolchain on plain Ubuntu (no CUDA).
          - variant: cpu
            dockerfile: cluster-dev/Dockerfile.cpu
            target: ""
            cache_scope: cluster-dev-cpu
            latest_value: cpu
            tag_prefix: "cpu-"
            free_disk: false

    steps:
      # GHA runners only have ~14GB free; the GPU variants pull in CUDA
      # cuDNN-devel which exceeds that without aggressive cleanup. CPU is
      # small enough that freeing disk just adds ~2 minutes for nothing.
      - name: Free runner disk space
        if: matrix.free_disk
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags / labels (GHCR)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.latest_value }},enable={{is_default_branch}}
            type=ref,event=branch,prefix=${{ matrix.tag_prefix }}
            type=ref,event=pr,prefix=${{ matrix.tag_prefix }}
            type=match,pattern=cluster-dev/v(.*),group=1,prefix=${{ matrix.tag_prefix }}
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}sha-

      # Build pushes to GHCR only. Docker Hub gets the same image via a
      # separate regctl mirror step below — buildx's monolithic blob PUT is
      # rejected by Docker Hub's CDN with `400 Bad request` for the large
      # cudnn-devel layer; regctl uses chunked uploads which work for any
      # blob size.
      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ./cluster-dev
          file: ./${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}
          provenance: false

      # ------------------------------------------------------------
      # Mirror GHCR -> Docker Hub via regctl (chunked uploads).
      # Skipped cleanly when DOCKERHUB_USERNAME is unset, so the workflow
      # works before the user has configured the Docker Hub credentials.
      # ------------------------------------------------------------
      - name: Install regctl
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) && vars.DOCKERHUB_USERNAME != ''
        env:
          REGCTL_VERSION: v0.7.2
        run: |
          set -euo pipefail
          curl -fsSL -o regctl \
            "https://github.com/regclient/regclient/releases/download/${REGCTL_VERSION}/regctl-linux-amd64"
          chmod +x regctl
          sudo mv regctl /usr/local/bin/regctl
          regctl version

      - name: Mirror GHCR -> Docker Hub
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) && vars.DOCKERHUB_USERNAME != ''
        env:
          GHCR_TAGS: ${{ steps.meta.outputs.tags }}
          GHCR_USER: ${{ github.actor }}
          GHCR_PASS: ${{ secrets.GITHUB_TOKEN }}
          DH_USER: ${{ vars.DOCKERHUB_USERNAME }}
          DH_PASS: ${{ secrets.DOCKERHUB_TOKEN }}
          DH_REPO: ${{ env.DOCKERHUB_REGISTRY }}/${{ vars.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        run: |
          set -euo pipefail
          regctl registry login "${GHCR_REGISTRY}" -u "$GHCR_USER" -p "$GHCR_PASS"
          regctl registry login "${DOCKERHUB_REGISTRY}" -u "$DH_USER" -p "$DH_PASS"

          mirrored=()
          while IFS= read -r ghcr_ref; do
            [ -z "$ghcr_ref" ] && continue
            tag="${ghcr_ref##*:}"
            hub_ref="${DH_REPO}:${tag}"
            echo "::group::Mirror $ghcr_ref -> $hub_ref"
            regctl image copy "$ghcr_ref" "$hub_ref"
            echo "::endgroup::"
            mirrored+=("$hub_ref")
          done <<< "$GHCR_TAGS"

          {
            echo "### ${{ matrix.variant }} — mirrored to Docker Hub"
            echo '```'
            printf '%s\n' "${mirrored[@]}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Summary (GHCR)
        if: steps.meta.outputs.tags != ''
        run: |
          {
            echo "### ${{ matrix.variant }} — pushed to GHCR"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
