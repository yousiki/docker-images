name: cluster-dev

on:
  push:
    branches: [main]
    tags: ['cluster-dev/v*']
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cluster-dev/**'
      - '.github/workflows/cluster-dev.yml'
  workflow_dispatch:
    inputs:
      push:
        description: 'Push image to GHCR (otherwise build only)'
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/cluster-dev

concurrency:
  group: cluster-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # GHA runners only have ~14GB free; CUDA devel + tooling exceeds that.
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags / labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=match,pattern=cluster-dev/v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./cluster-dev
          file: ./cluster-dev/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.push) }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cluster-dev
          cache-to: type=gha,mode=max,scope=cluster-dev
          provenance: false

      - name: Summary
        if: steps.meta.outputs.tags != ''
        run: |
          {
            echo "### Pushed tags"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
